<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited Local High-Speed Scraper</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121214; color: #e1e1e6; padding: 20px; max-width: 850px; margin: 0 auto; }
        .card { background: #202024; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #323238; }
        input, button { background: #121214; color: #fff; border: 1px solid #48484a; padding: 10px; border-radius: 4px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        input:focus { border-color: #7c4dff; outline: none; }
        button { background: #7c4dff; cursor: pointer; font-weight: bold; border: none; margin-top: 15px; }
        button:hover { background: #9466ff; }
        #terminal { background: #000; font-family: "Courier New", Courier, monospace; padding: 15px; border-radius: 6px; height: 350px; overflow-y: auto; font-size: 13px; line-height: 1.4; border: 1px solid #29292e; }
        .success { color: #00e676; }
        .warning { color: #ffd740; }
        .info { color: #40c4ff; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
    </style>
</head>
<body>

    <h2>Unlimited Local High-Speed Scraper</h2>
    
    <div class="card">
        <h3>Configuration Panel</h3>
        <label>Supabase URL</label>
        <input type="text" id="sbUrl" value="https://ucgxzganknweqfucjqqw.supabase.co">
        <label>Supabase Key</label>
        <input type="password" id="sbKey" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjZ3h6Z2Fua253ZXFmdWNqcXF3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTE5OTczNywiZXhwIjoyMDk0Nzc1NzM3fQ.yEap0n7fCuy44Ox0YXZpj4_cf3wO7IS6oJWA6sk0GqY">
        
        <div class="row" style="margin-top: 15px;">
            <div>
                <label>Starting Offset</label>
                <input type="number" id="offsetInput" value="0">
            </div>
            <div>
                <label>Concurrent Chunk Size</label>
                <input type="number" id="chunkSizeInput" value="100">
            </div>
            <div style="flex: 1.5; display: flex; align-items: flex-end;">
                <button id="actionBtn" onclick="toggleScraper()">Launch Unlimited Sync</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Live Processing Console</h3>
        <div id="terminal">--- System Idle. Run server.js locally and click Launch ---</div>
    </div>

<script>
let isRunning = false;
let supabaseClient = null;
const LOCAL_PROXY = "http://localhost:9999";
const logElement = document.getElementById("terminal");

function log(text, className = "") {
    const p = document.createElement("div");
    if (className) p.className = className;
    p.innerText = text;
    logElement.appendChild(p);
    logElement.scrollTop = logElement.scrollHeight;
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function toggleScraper() {
    if (isRunning) {
        isRunning = false;
        document.getElementById("actionBtn").innerText = "Launch Unlimited Sync";
        return;
    }
    const url = document.getElementById("sbUrl").value;
    const key = document.getElementById("sbKey").value;
    
    supabaseClient = supabase.createClient(url, key);
    isRunning = true;
    document.getElementById("actionBtn").innerText = "Pause System";
    logElement.innerHTML = "";
    log("[SYSTEM START] Local core loop active. No limits plan applied.", "info");

    runScraperLoop().catch(e => {
        log(`[CRITICAL] Error: ${e.message}`, "interrupted");
        isRunning = false;
    });
}

async function fetchExistingRecords(anilistIds) {
    if (!anilistIds.length) return {};
    const { data } = await supabaseClient.from("1").select("anilist_id, link").in("anilist_id", anilistIds.map(String));
    const cache = {};
    (data || []).forEach(row => { cache[parseInt(row.anilist_id)] = row.link || {}; });
    return cache;
}

async function fetchCatalogBatch(offset) {
    const query = `query CatalogAnime($filter: AnimeCatalogFilterInput, $sort: [AnimeSortInput!], $limit: Int, $offset: Int) {
      catalogAnime(filter: $filter, sort: $sort, limit: $limit, offset: $offset) {
        items { id anilistId titleEnglish titleRomaji subCount dubCount }
        hasNextPage
      }
    }`;
    const res = await fetch(`${LOCAL_PROXY}/catalog`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, variables: { filter: {}, sort: [{ field: "POPULARITY", direction: "DESC" }], limit: 30, offset } })
    });
    const body = await res.json();
    return body.data?.catalogAnime || {};
}

async function processEpisodesPipeline(uniqueSlug, subCount, dubCount, existingLinks) {
    const chunkSize = parseInt(document.getElementById("chunkSizeInput").value) || 100;
    const episodesMap = { ...existingLinks };
    const taskQueue = [];

    for (let e = 1; e <= subCount; e++) if (!(`ep_${e}_sub` in episodesMap)) taskQueue.push({ e, type: "sub" });
    for (let e = 1; e <= dubCount; e++) if (!(`ep_${e}_dub` in episodesMap)) taskQueue.push({ e, type: "dub" });

    if (!taskQueue.length) return { map: episodesMap, success: true };

    log(`  [*] Processing ${taskQueue.length} items in parallel chunks of ${chunkSize}...`);

    for (let i = 0; i < taskQueue.length; i += chunkSize) {
        if (!isRunning) return { map: {}, success: false };
        const chunk = taskQueue.slice(i, i + chunkSize);

        const promises = chunk.map(task => {
            const key = `ep_${task.e}_${task.type}`;
            return fetch(`${LOCAL_PROXY}/sources?id=${uniqueSlug}&epNum=${task.e}&type=${task.type}`)
                .then(async res => {
                    if (!res.ok) return { key, status: "fail" };
                    const data = await res.json();
                    if (data.error === "episode not found") return { key, status: "404" };
                    if (data.sources?.[0]?.url) {
                        return { key, status: "ok", url: data.sources[0].url.replace("playeng.animeapps.top/r2", "bd.24stream.xyz/media") };
                    }
                    return { key, status: "fail" };
                }).catch(() => ({ key, status: "fail" }));
        });

        const results = await Promise.all(promises);
        results.forEach(r => { if (r.status === "ok") episodesMap[r.key] = r.url; });
        log(`  [+] Chunk progress: ${i + chunk.length}/${taskQueue.length} synced.`);
        await sleep(50); // Minimal resting gap
    }
    return { map: episodesMap, success: true };
}

async function runScraperLoop() {
    let offset = parseInt(document.getElementById("offsetInput").value) || 0;
    let hasNextPage = true;

    while (hasNextPage && isRunning) {
        log(`\n=================== CATALOG OFFSET: ${offset} ===================`, "info");
        document.getElementById("offsetInput").value = offset;

        const catalog = await fetchCatalogBatch(offset);
        const items = catalog.items || [];
        hasNextPage = catalog.hasNextPage || false;
        if (!items.length) break;

        const dbCache = await fetchExistingRecords(items.map(i => i.anilistId).filter(Boolean));

        for (const item of items) {
            if (!isRunning) return;
            const expected = (item.subCount || 0) + (item.dubCount || 0);
            if (!expected) continue;

            const cache = dbCache[item.anilistId] || {};
            if (item.anilistId in dbCache && Object.keys(cache).length >= expected) {
                log(`[SKIP] ${item.titleEnglish || item.titleRomaji}`);
                continue;
            }

            log(`\n[*] Targeting: ${item.titleEnglish || item.titleRomaji}`, "info");
            const pipeline = await processEpisodesPipeline(item.id, item.subCount || 0, item.dubCount || 0, cache);
            if (!pipeline.success || !Object.keys(pipeline.map).length) continue;

            try {
                const cleanSlug = item.id.includes('-') ? item.id.substring(0, item.id.lastIndexOf('-')) : item.id;
                const payload = { anilist_id: String(item.anilistId), title: item.titleEnglish || item.titleRomaji, slug: cleanSlug, unique_slug: item.id, link: pipeline.map, S: item.subCount || 0, D: item.dubCount || 0 };
                
                if (item.anilistId in dbCache) {
                    await supabaseClient.from("1").update({ link: pipeline.map }).eq("anilist_id", String(item.anilistId));
                } else {
                    await supabaseClient.from("1").insert([payload]);
                }
                log(`[SUCCESS] Database updated: ${item.titleEnglish || item.titleRomaji}`, "success");
            } catch (err) {
                log(`[ERROR] DB Save Error: ${err.message}`);
            }
        }
        offset += 30;
        await sleep(500);
    }
}
</script>
</body>
</html>
