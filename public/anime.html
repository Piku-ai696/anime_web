<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N041YDF91X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZyroX — Loading Title…</title>
  <meta name="description" content="ZyroX — Premium details view." />
  <link href="/css/theater.css" rel="stylesheet" />
  <style>
    /* ── Details Page Specific Styles ───────────────────────────────────────── */
    .details-wrap {
      display: flex;
      gap: 40px;
      margin-top: 40px;
      margin-bottom: 60px;
      min-height: calc(100vh - 160px);
      align-items: center;
      justify-content: center;
    }

    .details-container {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      animation: detailsFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes detailsFadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Left: Poster */
    .details-poster-wrap {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 2/3;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      transition: transform 0.4s ease, border-color 0.4s ease;
    }

    .details-poster-wrap:hover {
      transform: scale(1.02);
      border-color: rgba(139, 92, 246, 0.4);
    }

    .details-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Right: Info Column */
    .details-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .details-badge {
      display: inline-flex;
      align-items: center;
      background: var(--accent-dim);
      color: var(--accent-bright);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid rgba(139, 92, 246, 0.15);
      align-self: flex-start;
      margin-bottom: 5px;
    }

    .details-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .details-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .details-meta-tag {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .details-desc-header {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-top: 10px;
    }

    .details-desc {
      font-size: 1.05rem;
      color: var(--text-primary);
      line-height: 1.6;
      opacity: 0.9;
    }

    .details-actions {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      align-items: center;
    }

    .details-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }

    .details-btn.primary {
      background: var(--accent);
      color: #FFF;
      border: none;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    .details-btn.primary:hover {
      background: var(--accent-bright);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
    }

    .details-btn.secondary {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .details-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    /* ── Skeletons ───────────────────────────────────────────────────────────── */
    .details-skeleton-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 40px;
      width: 100%;
      max-width: 1000px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-lg);
    }

    @media (max-width: 820px) {

      .details-container,
      .details-skeleton-container {
        grid-template-columns: 1fr;
        padding: 24px;
        gap: 24px;
      }

      .details-poster-wrap {
        max-width: 240px;
        margin: 0 auto;
      }

      .details-wrap {
        padding: 16px;
      }
    }
  </style>
</head>

<body style="background-color: #0A0A0B;">

  <div id="ambient-glow"></div>

  <!-- Navigation -->
  <nav class="nav-bar">
    <a class="nav-brand" href="/">
      <span class="logo"><span class="logo-zyro">zyro</span><span class="logo-x">X</span></span>
      <span class="nav-badge">Catalog</span>
    </a>
    <div class="nav-actions">
      <a href="/" class="details-btn secondary" style="padding: 8px 16px; font-size: 0.85rem;">
        ← Back to Catalog
      </a>
    </div>
  </nav>

  <main class="page-wrap">
    <div class="details-wrap">

      <!-- Skeleton View -->
      <div class="details-skeleton-container" id="details-skeleton">
        <div class="skeleton skeleton-card" style="width: 100%; height: 450px;"></div>
        <div style="display: flex; flex-direction: column; gap: 20px; justify-content: center;">
          <div class="skeleton" style="width: 120px; height: 28px; border-radius: 20px;"></div>
          <div class="skeleton" style="width: 80%; height: 42px;"></div>
          <div style="display: flex; gap: 10px;">
            <div class="skeleton" style="width: 80px; height: 30px;"></div>
            <div class="skeleton" style="width: 100px; height: 30px;"></div>
            <div class="skeleton" style="width: 90px; height: 30px;"></div>
          </div>
          <div class="skeleton" style="width: 100%; height: 120px; margin-top: 10px;"></div>
          <div style="display: flex; gap: 15px; margin-top: 15px;">
            <div class="skeleton" style="width: 180px; height: 48px;"></div>
            <div class="skeleton" style="width: 140px; height: 48px;"></div>
          </div>
        </div>
      </div>

      <!-- Real Content Panel (Hidden Initially) -->
      <div class="details-container" id="details-panel" style="display: none;">
        <!-- Poster Panel -->
        <div class="details-poster-wrap">
          <img class="details-poster" id="info-poster" src="" alt=""
            onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'320\' height=\'480\'><rect width=\'320\' height=\'480\' fill=\'%2318181b\'/><text x=\'50%27\' y=\'50%27\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%2355555e\' font-family=\'sans-serif\' font-size=\'16\'>No Poster</svg>'" />
        </div>

        <!-- Meta & Description Panel -->
        <div class="details-info">
          <span class="details-badge" id="info-badge">★ Featured Arc</span>
          <h1 class="details-title" id="info-title">Loading…</h1>

          <div class="details-meta-row">
            <span class="details-meta-tag" id="info-type">TV</span>
            <span class="details-meta-tag" id="info-eps">0 Episodes</span>
            <span class="details-meta-tag" id="info-status">Ongoing</span>
          </div>

          <h3 class="details-desc-header">Synopsis</h3>
          <p class="details-desc" id="info-desc">Loading description text directly from our table...</p>

          <div class="details-actions">
            <a class="details-btn primary" id="btn-watch" href="#">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3" />
              </svg>
              Start Watching
            </a>
            <a class="details-btn secondary" href="/">
              Back to Catalog
            </a>
          </div>
        </div>
      </div>

    </div>

    <!-- Recommendations Section -->
    <section id="recommendations-section" style="margin-top: 50px; margin-bottom: 60px; display: none;">
      <div class="section-header" style="margin-bottom: 24px;">
        <h2 class="section-title">Recommended For You</h2>
      </div>
      <div class="card-grid" id="recommendations-grid"></div>
    </section>
  </main>

  <script>
    const API = 'https://zyrox-backend.onrender.com/api';
    const PROXY_BASE = 'https://zyrox-backend.onrender.com/proxy?url=';
    const skeleton = document.getElementById('details-skeleton');
    const panel = document.getElementById('details-panel');

    // Compute episode count dynamically to solve [object Object] rendering
    function getEpisodeCount(anime) {
      if (!anime) return 0;
      if (anime.s_m3u8_url && Array.isArray(anime.s_m3u8_url)) {
        return anime.s_m3u8_url.length;
      }
      if (typeof anime.s_m3u8_url === 'string') {
        try {
          const parsed = JSON.parse(anime.s_m3u8_url);
          if (Array.isArray(parsed)) return parsed.length;
        } catch (e) { }
      }
      if (anime.s_eps && Array.isArray(anime.s_eps)) {
        return anime.s_eps.length;
      }
      if (typeof anime.s_eps === 'object' && anime.s_eps !== null) {
        return Object.keys(anime.s_eps).length;
      }
      if (anime.s_eps) {
        const parsedNum = parseInt(anime.s_eps, 10);
        if (!isNaN(parsedNum)) return parsedNum;
      }
      return 0;
    }

    // Get ID from query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const animeId = urlParams.get('id');

    async function loadDetails() {
      if (!animeId) {
        window.location.href = '/';
        return;
      }

      try {
        const resp = await fetch(`${API}/anime/${encodeURIComponent(animeId)}`);
        if (!resp.ok) throw new Error('Anime not found');
        const anime = await resp.json();

        // Bind data
        document.title = `${anime.title || 'Anime Details'} — ZyroX`;
        document.getElementById('info-title').textContent = anime.title || 'Untitled';
        document.getElementById('info-desc').textContent = anime.description || 'No description available.';
        document.getElementById('info-type').textContent = anime.type || 'TV';
        document.getElementById('info-eps').textContent = `${getEpisodeCount(anime)} Episodes`;
        document.getElementById('info-status').textContent = anime.status || 'Unknown';

        const posterUrl = anime.poster || '';
        const proxied = posterUrl ? PROXY_BASE + encodeURIComponent(posterUrl) : '';
        if (proxied) {
          document.getElementById('info-poster').src = proxied;
          document.getElementById('info-poster').alt = anime.title || '';
        }

        // Action routing
        document.getElementById('btn-watch').href = `theater.html?id=${encodeURIComponent(animeId)}&ep=1`;

        // Ambient glow sampling from poster
        if (proxied) {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            try {
              const c = document.createElement('canvas');
              const ctx = c.getContext('2d');
              c.width = 64; c.height = 64;
              ctx.drawImage(img, 0, 0, 64, 64);
              const d = ctx.getImageData(0, 0, 64, 64).data;
              let rS = 0, gS = 0, bS = 0, n = 0;
              for (let i = 0; i < d.length; i += 64) {
                const lum = (d[i] + d[i + 1] + d[i + 2]) / 3;
                if (lum > 30 && lum < 220) { rS += d[i]; gS += d[i + 1]; bS += d[i + 2]; n++; }
              }
              if (n) document.documentElement.style.setProperty('--ambient-color',
                `rgba(${Math.round(rS / n)},${Math.round(gS / n)},${Math.round(bS / n)},0.12)`);
            } catch (e) { }
          };
          img.src = proxied;
        }

        // Load recommendations
        loadRecommendations(animeId);

        // Reveal panel and hide skeleton smoothly
        skeleton.style.display = 'none';
        panel.style.display = 'grid';

      } catch (err) {
        console.error('[Details] Load failed:', err);
        skeleton.style.display = 'none';
        panel.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1; padding: 60px 40px; text-align: center;">
            <div class="icon" style="font-size: 3rem; margin-bottom: 20px;">⚠️</div>
            <div class="message" style="font-size: 1.2rem; color: var(--text-primary); margin-bottom: 20px;">
              ${err.message || 'Failed to load details for this anime.'}
            </div>
            <a class="details-btn primary" href="/">Return to Catalog</a>
          </div>
        `;
        panel.style.display = 'block';
      }
    }

    async function loadRecommendations(id) {
      const recommendationsSection = document.getElementById('recommendations-section');
      const recommendationsGrid = document.getElementById('recommendations-grid');
      
      try {
        const resp = await fetch(`${API}/anime/${encodeURIComponent(id)}/recommendations`);
        if (!resp.ok) throw new Error('Failed to load recommendations');
        const list = await resp.json();
        
        if (list && list.length > 0) {
          recommendationsGrid.innerHTML = '';
          list.forEach((anime, idx) => {
            const posterUrl = anime.poster || '';
            const proxied = posterUrl ? PROXY_BASE + encodeURIComponent(posterUrl) : '';
            const epCount = getEpisodeCount(anime);

            const card = document.createElement('div');
            card.className = 'anime-card fade-in';
            card.style.animationDelay = `${Math.min(idx * 40, 800)}ms`;
            card.onclick = () => window.location.href = `anime.html?id=${encodeURIComponent(anime.id)}`;

            card.innerHTML = `
              ${proxied
                ? `<img class="card-poster" src="${proxied}" alt="${anime.title || ''}" loading="lazy" onerror="this.style.display='none'" />`
                : `<div class="card-poster" style="background:var(--bg-elevated)"></div>`
              }
              ${epCount ? `<span class="card-ep-badge">${epCount} Episodes</span>` : ''}
              <div class="card-play-icon">
                <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
              <div class="card-overlay">
                <div class="card-title">${anime.title || 'Untitled'}</div>
                <div class="card-meta">${[anime.type, anime.status].filter(Boolean).join(' · ')}</div>
              </div>
            `;
            recommendationsGrid.appendChild(card);
          });
          recommendationsSection.style.display = 'block';
        }
      } catch (err) {
        console.error('[Recommendations] Error:', err);
      }
    }

    loadDetails();
  </script>
</body>

</html>
